<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Charm:wght@400;700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="contact-content">
    <a href="index.html">Homepage</a>
    <div class="content-container">
      <div class="content">
        <h1>GET IN TOUCH</h1>
        <div class="row">
          <div class="col-md-6">
            <p class="mt-5">
              <strong
                >Please provide some information on your project or goals and
                we'll move the conversation from there.</strong
              >
            </p>
            <form class="contact-box border p-3 rounded mt-5 mb-3">
              <div class="mb-3">
                <label for="fname">First Name:</label>
                <input
                  type="text"
                  id="firstName"
                  name="firstName"
                  class="form-control"
                  required
                />
                <label for="lname">Last Name:</label>
                <input
                  type="text"
                  id="lastName"
                  name="lastName"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Enter your Email:</label>
                <input type="email" class="form-control" required autofocus />
              </div>
              <div class="mb-3">
                <label class="form-label">Message</label>
                <textarea
                  name="message"
                  class="form-control"
                  required
                  style="height: 150px"
                ></textarea>
                <button type="submit" class="btn btn-branding">Send</button>
              </div>
            </form>
          </div>
          <div class="col mt-5">
            <p><strong>Address:</strong></p>
            <p>St. Louis Jewelers</p>
            <p>3910 Gravois Avenue</p>
            <p>St. Louis, MO 63116</p>
            <p><strong>Phone number:</strong></p>
            <p>(314) 771-5717</p>
            <p class="mb-5">
              <strong>Email:</strong>
              stlouisjewelersusa@gmail.com
            </p>
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3118.5198936259194!2d-90.25448348874973!3d38.59090247167337!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x87d8b473927daa93%3A0xb3d3726be621bfbd!2sSt.%20Louis%20Jewelers%20(Joyer%C3%ADa)!5e0!3m2!1sen!2sus!4v1738643799131!5m2!1sen!2sus"
              width="400"
              height="250"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
